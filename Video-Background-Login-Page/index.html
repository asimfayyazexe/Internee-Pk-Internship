<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <video autoplay loop muted play-inline class="bg-video">
        <source src="Droneshot.mp4" type="video/webm">
    </video>



    <div class="wrapper">
        <form action="">
            <h1>Login</h1>
            <div class="input-box">
                <input id="email" type="email" placeholder="Email">
                <i class="fa-solid fa-user"></i>
                <small class="error emailError">The email is incorrect</small>
            </div>
            <div class="input-box">
                <input id="password" type="password" placeholder="Password">
                <i class="fa-solid fa-lock"></i>
                <small class="error passwordError">The password is incorrect</small>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox">Remember me</label>
                <a href="#">Forgot Password</a>
            </div>
            <div class="btn">
                <input type="submit">
            </div>
            <div class="acc-register">
                <p>Do you have an account? <a href="">Register</a></p>

            </div>
        </form>

    </div>

    <script src="script.js"></script>
</body>

</html>
