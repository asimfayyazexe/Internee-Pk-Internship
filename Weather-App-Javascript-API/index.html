<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!--Linking Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
    <!-- Font Awsome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

    <!-- Header -->
    <div class="container">
        <div class="header">
            <h1>Weather App</h1>
            <div class="search-weather">
                <input type="text" name="city" id="city-input" placeholder="Enter City">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <!-- Main Section -->
        <main>
            <div class="card">
                <div class="weather-icon">
                    <img id="weather-icon" height="150" src="images/mist.png" alt="Weather Icon">
                </div>
                <div class="weather-info">
                    <h2 id="city-name">Lahore</h2>
                    <p id="temperature">22°C</p>
                    <div class="details">
                        <div class="col">
                            <img height="60" id="humidity-img" src="images/humidity.png" alt="">
                            <p id="humidity">50%</p>
                            <p>Humidity</p>
                        </div>
                        <div class="col">
                            <img height="60" id="wind-img" src="images/wind.png" alt="">
                            <p id="wind">15 km/h</p>
                            <p>Wind Speed</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script src="script.js"></script>
</body>

</html>
